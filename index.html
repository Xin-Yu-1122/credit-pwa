<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="信用卡記帳">
  <meta name="theme-color" content="#1a2332">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <title>信用卡記帳</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;
      background:#1a2332;
      min-height:100vh;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      color:white;
    }
    img{width:72px;height:72px;border-radius:16px;margin-bottom:14px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
    h1{font-size:18px;font-weight:600;margin-bottom:6px}
    p{font-size:13px;color:rgba(255,255,255,.5)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader{width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-top:24px}
  </style>
</head>
<body>
  <img src="icon-192.png" alt="">
  <h1>信用卡記帳</h1>
  <p>載入中，請稍候…</p>
  <div class="loader"></div>

  <script>
    // 註冊 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // 直接跳轉到 Apps Script
    var TARGET = 'https://script.google.com/macros/s/AKfycbz7m2TZaYim0uvaObhebTGEIJYK4BW_HjFAsC_snRvmPxxt0vIljs59ypNGoPcNY2xj0A/exec';
    window.location.replace(TARGET);
  </script>
</body>
</html>
